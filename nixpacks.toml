[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
# --accept-data-loss matches the Dockerfile builder rationale (see
# Dockerfile lines 75-87 comment block): Prisma's "data loss" warning
# fires on safe additions like new unique constraints when no actual
# duplicates exist, and blocking the start phase on it just stalls
# deploys. Schema PRs are the place to catch real data-loss intent.
cmd = "npx prisma db push --skip-generate --accept-data-loss && npm run start"
