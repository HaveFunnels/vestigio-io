[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps"]

[phases.build]
cmds = ["echo BUILD_MARKER_v2 && ls src/app/ | head -10 && ls src/app/\\(site\\)/ 2>/dev/null || echo 'no (site) dir' && ls src/app/\\(blog\\)/ 2>/dev/null || echo 'no (blog) dir'", "npx prisma generate", "npm run build"]

[start]
cmd = "npx prisma db push --skip-generate && npm run start"
